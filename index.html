<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Tic-Tac-Toe</h1>
    <div class="player-names">
      <input type="text" id="player1" placeholder="Player 1 Name (X)">
      <input type="text" id="player2" placeholder="Player 2 Name (O)">
      <button id="start-game-btn">Start Game</button>
    </div>
    <div class="streak-info hidden">
      <p><span id="player1-name">Player 1</span> Wins: <span id="player1-streak">0</span></p>
      <p><span id="player2-name">Player 2</span> Wins: <span id="player2-streak">0</span></p>
    </div>
    <div class="game hidden">
      <div class="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>
      <p class="status">PLAYER 1'S TURN (X)</p>
      <button class="restart-btn">Restart Game</button>
    </div>
  </div>
  <div class="result-screen hidden">
    <h1 class="result-message"></h1>
    <p class="streak-message"></p>
    <button class="new-game-btn">New Game</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
